<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Самостоятельная работа</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 10px 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #005ecb;
    }

    #submitBtn {
      width: 100%;
      margin-top: 8px;
    }

    .post {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .time {
      font-size: 12px;
      color: gray;
      float: right;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .like-btn {
      background: #f2f2f2;
      color: black;
      border: 1px solid #ddd;
    }

    .dislike-btn {
      background: #ffeaea;
      color: black;
      border: 1px solid #f0bcbc;
    }

    .search-box {
      width: 100%;
      max-width: 520px;
      margin-bottom: 14px;
    }

    .empty {
      color: gray;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="uName" placeholder="Имя профиля" />
    <input type="email" id="uEmail" placeholder="Рабочий Email" />
    <button id="submitBtn">Опубликовать в облако</button>
  </div>

  <input class="search-box" type="text" id="searchInput" placeholder="Поиск по имени..." />

  <div id="feed" style="width: 100%; max-width: 520px;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      updateDoc,
      doc,
      increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDJTrafhcsfW7KrODLeoTBerMWIiDpB1Y",
      authDomain: "my-firebase-site-23fcb.firebaseapp.com",
      projectId: "my-firebase-site-23fcb",
      storageBucket: "my-firebase-site-23fcb.firebasestorage.app",
      messagingSenderId: "890897119018",
      appId: "1:890897119018:web:44a14397e0236673969053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allPosts = [];

    window.processLike = async (id) => {
      const docRef = doc(db, "requests", id);
      try {
        await updateDoc(docRef, {
          likes: increment(1)
        });
      } catch (e) {
        console.error("Ошибка лайка:", e.message);
      }
    };

    window.processDislike = async (id) => {
      const docRef = doc(db, "requests", id);
      try {
        await updateDoc(docRef, {
          dislikes: increment(1)
        });
      } catch (e) {
        console.error("Ошибка дизлайка:", e.message);
      }
    };

    document.getElementById("submitBtn").onclick = async () => {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;

      try {
        await addDoc(collection(db, "requests"), {
          name: document.getElementById("uName").value,
          email: document.getElementById("uEmail").value,
          likes: 0,
          dislikes: 0,
          timestamp: serverTimestamp()
        });

        document.getElementById("uName").value = "";
        document.getElementById("uEmail").value = "";
      } catch (e) {
        alert("Ошибка безопасности. Данные отклонены сервером.");
        console.error(e);
      }

      btn.disabled = false;
    };

    function renderPosts(posts) {
      const feed = document.getElementById("feed");
      const searchText = document.getElementById("searchInput").value.toLowerCase().trim();

      const filteredPosts = posts.filter((item) =>
        item.data.name.toLowerCase().includes(searchText)
      );

      feed.innerHTML = "";

      if (filteredPosts.length === 0) {
        feed.innerHTML = '<div class="empty">Ничего не найдено</div>';
        return;
      }

      filteredPosts.forEach((item) => {
        const data = item.data;
        const timeText = data.timestamp?.toDate
          ? data.timestamp.toDate().toLocaleTimeString()
          : "Загрузка...";

        feed.innerHTML += `
          <div class="post">
            <span class="time">${timeText}</span>
            <b>${data.name}</b><br>
            <i>${data.email}</i>
            <div class="actions">
              <button class="like-btn" onclick="processLike('${item.id}')">👍 ${data.likes || 0}</button>
              <button class="dislike-btn" onclick="processDislike('${item.id}')">👎 ${data.dislikes || 0}</button>
            </div>
          </div>
        `;
      });
    }

    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      allPosts = snapshot.docs.map((item) => ({
        id: item.id,
        data: item.data()
      }));
      renderPosts(allPosts);
    });

    document.getElementById("searchInput").addEventListener("input", () => {
      renderPosts(allPosts);
    });
  </script>

</body>
</html>
