<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой облачный проект</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f4f4f9;
    }

    .form-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e68900;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Отправить заявку</h2>
    <form id="feedbackForm">
      <input type="text" id="userName" placeholder="Ваше имя" required>
      <input type="email" id="userEmail" placeholder="Ваш Email" required>
      <button type="submit">Отправить в облако</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDJTrafhcsfW7KrODLeoTBerMWIiDpB1Y",
      authDomain: "my-firebase-site-23fcb.firebaseapp.com",
      projectId: "my-firebase-site-23fcb",
      storageBucket: "my-firebase-site-23fcb.firebasestorage.app",
      messagingSenderId: "890897119018",
      appId: "1:890897119018:web:44a14397e0236673969053"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nameInput = document.getElementById("userName").value;
      const emailInput = document.getElementById("userEmail").value;

      try {
        await addDoc(collection(db, "requests"), {
          name: nameInput,
          email: emailInput,
          timestamp: new Date()
        });

        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("feedbackForm").reset();
      } catch (error) {
        console.error("Ошибка записи:", error);
        alert("Ошибка при отправке.");
      }
    });
  </script>

</body>
</html>
